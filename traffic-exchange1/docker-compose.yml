# Full self-hosted stack: app + Postgres + Redis + nginx (TLS termination).
# Usage:
#   cp .env.example .env   # then edit secrets
#   docker compose up -d --build
#   docker compose run --rm app npx prisma migrate deploy
#   docker compose run --rm app npm run db:seed

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tx_password}
      POSTGRES_DB: traffic_exchange
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tx -d traffic_exchange"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # Override hosts to the compose service names.
      DATABASE_URL: postgresql://tx:${POSTGRES_PASSWORD:-tx_password}@db:5432/traffic_exchange?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    depends_on:
      - app

volumes:
  pgdata:
  redisdata:
